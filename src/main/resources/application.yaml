spring:
  application:
    name: todo

  datasource:
    url: jdbc:postgresql://localhost:5432/todo_spring_boot
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true